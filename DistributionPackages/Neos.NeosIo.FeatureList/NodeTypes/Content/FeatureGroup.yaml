
'Neos.NeosIo.FeatureList:FeatureGroup':
  superTypes:
    'Neos.Neos:Content': true
    'Neos.NeosIo:Mixin.Icon': true
  ui:
    label: 'Feature Group'
    icon: tags
    group: feature
    inlineEditable: true
    inspector:
      groups:
        feature:
          label: 'Feature properties'
          tab: default
  constraints:
    nodeTypes:
      '*': false
      'Neos.NeosIo.FeatureList:Feature': true
  properties:
    title:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Feature Group Title'
      options:
        preset: NeosIo.text.plain
    description:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Feature Group Description'
      options:
        preset: NeosIo.text.free
    icon:
      ui:
        inspector:
          group: feature
    features:
      type: references
      ui:
        label: 'Features'
        reloadIfChanged: true
        inspector:
          group: feature
          position: 60
          editorOptions:
            nodeTypes: ['Neos.NeosIo.FeatureList:Feature']
