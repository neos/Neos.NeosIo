'Neos.NeosConIo:BreakInSchedule':
  superTypes:
    'Neos.Neos:Content': true
  label: "${Neos.Node.labelForNode(node).properties('title')}"
  ui:
    label: 'Break in schedule'
    icon: 'mug-saucer'
    group: neoscon
    inspector:
      groups:
        'breakSettings':
          label: 'Break settings'
  properties:
    title:
      type: string
      ui:
        label: 'Title'
        inspector:
          group: 'breakSettings'
    type:
      type: string
      ui:
        label: 'Schedule type'
        reloadIfChanged: true
        inspector:
          group: 'breakSettings'
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            allowEmpty: true
            placeholder: 'Break (coffee, lunch, …)'
            values:
              SPECIAL:
                label: 'Special (social event, …)'
    talkDate:
      type: DateTime
      ui:
        label: 'Date & Time'
        reloadIfChanged: true
        inspector:
          group: 'breakSettings'
          editor: 'Neos.Neos/Inspector/Editors/DateTimeEditor'
          editorOptions:
            format: 'd.m.Y G:i'
    text:
      type: string
      ui:
        label: 'Additional Text'
        inspector:
          group: 'breakSettings'
