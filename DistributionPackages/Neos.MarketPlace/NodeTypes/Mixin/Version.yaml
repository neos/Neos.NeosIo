'Neos.MarketPlace:Version':
  abstract: true
  label: '${q(node).property(''version'') + '' ('' + q(node).property(''type'') + '')''}'
  superTypes:
    'Neos.Neos:Content': true
    'Neos.MarketPlace:Mixin.Source': true
    'Neos.MarketPlace:Mixin.Dist': true
  search:
    fulltext:
      enable: true
  ui:
    label: i18n
    icon: file
    inspector:
      groups:
        general:
          label: i18n
        dependencies:
          label: i18n
  properties:
    version:
      type: string
      ui:
        label: i18n
        inspector:
          group: general
          position: 1
          editorOptions:
            readonly: true
    versionNormalized:
      type: integer
      search:
        elasticSearchMapping:
          type: long
      ui:
        label: i18n
        inspector:
          group: general
          position: 2
          editorOptions:
            readonly: true
    stability:
      type: boolean
      search:
        elasticSearchMapping:
          type: boolean
      ui:
        label: i18n
        inspector:
          group: general
          editorOptions:
            readonly: true
    stabilityLevel:
      type: string
      search:
        elasticSearchMapping:
          type: keyword
      ui:
        label: i18n
        inspector:
          group: general
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            placeholder: i18n
            values:
              '':
                label: ''
              stable:
                label: i18n
              dev:
                label: i18n
              alpha:
                label: i18n
              beta:
                label: i18n
              rc:
                label: i18n
    description:
      type: string
      ui: &readonlyPropertyUiSettings
        label: i18n
        inspector:
          group: general
          editorOptions:
            readonly: true
    keywords:
      type: string
      ui:
        label: i18n
        inspector:
          group: general
          editorOptions:
            readonly: true
      search:
        indexing: '${MarketIndexing.trimExplode(q(node).property(''keywords''))}'
        elasticSearchMapping:
          type: text
          fields:
            name:
              type: text
            tag:
              type: keyword
            suggestion:
              type: completion
              analyzer: simple
              search_analyzer: simple
    homepage:
      type: string
      ui: *readonlyPropertyUiSettings
    license:
      type: string
      ui: *readonlyPropertyUiSettings
    type:
      type: string
      ui: *readonlyPropertyUiSettings
    time:
      type: DateTime
      ui: *readonlyPropertyUiSettings
    abandoned:
      type: string
      ui: *readonlyPropertyUiSettings
    bin:
      type: string
      ui: *readonlyPropertyUiSettings
    provide:
      type: string
      ui: *readonlyPropertyUiSettings
    require:
      type: string
      ui: *readonlyPropertyUiSettings
    requireDev:
      type: string
      ui: *readonlyPropertyUiSettings
    suggest:
      type: string
      ui: *readonlyPropertyUiSettings
    conflict:
      type: string
      ui: *readonlyPropertyUiSettings
    replace:
      type: string
      ui: *readonlyPropertyUiSettings
