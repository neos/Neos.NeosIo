Neos:
  Neos:
    nodeTypes:
      presets:
        properties:
          NeosIo:
            plainText:
              type: string
              ui:
                inlineEditable: true
                inline:
                  editorOptions:
                    placeholder: '(( text plain ))'
                    autoparagraph: false
                    formatting:
                      removeFormat: true

            textBlock:
              type: string
              ui:
                inlineEditable: true
                inline:
                  editorOptions:
                    placeholder: '(( text block ))'
                    autoparagraph: true
                    linking:
                      anchor: true
                      title: true
                      relNofollow: false
                      targetBlank: false
                    formatting:
                      strong: true
                      em: true
                      u: false
                      underline: false
                      strikethrough: false
                      sub: true
                      sup: true
                      del: false
                      p: true
                      h1: false
                      h2: false
                      h3: false
                      h4: false
                      h5: false
                      h6: false
                      pre: false
                      removeFormat: true
                      left: false
                      right: false
                      center: false
                      justify: false
                      table: false
                      ol: false
                      ul: false
                      a: true

            freeText:
              type: string
              ui:
                inlineEditable: true
                inline:
                  editorOptions:
                    placeholder: '(( text ))'
                    autoparagraph: true
                    linking:
                      anchor: true
                      title: true
                      relNofollow: false
                      targetBlank: false
                    formatting:
                      strong: true
                      em: true
                      u: true
                      underline: true
                      strikethrough: true
                      sub: true
                      sup: true
                      del: true
                      p: true
                      h1: true
                      h2: true
                      h3: true
                      h4: true
                      h5: true
                      h6: true
                      pre: true
                      removeFormat: true
                      left: false
                      right: false
                      center: false
                      justify: false
                      table: true
                      ol: true
                      ul: true
                      a: true

            alignment:
              type: string
              scope: nodeAggregate
              ui:
                label: 'Alignment'
                reloadIfChanged: true
                inspector:
                  group: appearance
                  editor: Beromir.ToggleEditor/Editor
                  editorOptions:
                    values:
                      Left:
                        description: Left
                        icon: align-left
                      Center:
                        description: Center
                        icon: align-center
                      Right:
                        description: Right
                        icon: align-right

            colorBackgroundSolid:
              type: string
              scope: nodeAggregate
              ui:
                label: 'Background Color'
                reloadIfChanged: true
                inspector:
                  group: appearance
                  editor: Beromir.ToggleEditor/Editor
                  editorOptions:
                    layout: color
                    values: &solidColors
                      blue-dark:
                        color: "#26224c"
                        description: "Blue Dark"
                      blue:
                        color: "#0114c2"
                        description: "Blue"
                      blue-light:
                        color: "#00cffd"
                        description: "Blue Light"
                      purple:
                        color: "#8a3ffc"
                        description: "Purple"
                      purple-dark:
                        color: "#602cb0"
                        description: "Purple Dark"
                      green:
                        color: "#35ba34"
                        description: "Green"
                      green-dark:
                        color: "#1d751d"
                        description: "Green Dark"
                      yellow:
                        color: "#f1c21b"
                        description: "Yellow"
                      yellow-dark:
                        color: "#b08c0e"
                        description: "Yellow Dark"
                      orange:
                        color: "#ff832b"
                        description: "Orange"
                      red:
                        color: "#fa4d56"
                        description: "Red"
            colorBackgroundWithGradients:
              type: string
              scope: nodeAggregate
              ui:
                label: 'Background Color'
                reloadIfChanged: true
                inspector:
                  group: appearance
                  editor: Beromir.ToggleEditor/Editor
                  editorOptions:
                    layout: color
                    values:
                      <<: *solidColors
                      blue-dark-to-blue:
                        color:
                          - "#26224c"
                          - "#0114c2"
                        description: "Blue gradient"
                      blue-dark-to-blue-light:
                        color:
                          - "#26224c"
                          - "#00cffd"
                        description: "Dark to light Blue gradient"
                      blue-to-blue-light:
                        color:
                          - "#0114c2"
                          - "#00cffd"
                        description: "Light blue gradient"
                      purple-dark-to-purple:
                        color:
                          - "#602cb0"
                          - "#8a3ffc"
                        description: "Purple gradient"
                      green-dark-to-green:
                        color:
                          - "#1d751d"
                          - "#35ba34"
                        description: "Green gradient"
                      yellow-dark-to-yellow:
                        color:
                          - "#b08c0e"
                          - "#f1c21b"
                        description: "Yellow gradient"
                      red-to-orange:
                        color:
                          - "#fa4d56"
                          - "#ff832b"
                        description: "Orange gradient"
            colorTheme:
              type: string
              scope: nodeAggregate
              ui:
                label: 'Color'
                showInCreationDialog: true
                reloadIfChanged: true
                inspector:
                  editor: 'Shel.Neos.ColorPicker/ColorPickerEditor'
                  group: appearance
                  editorOptions:
                    mode: 'preset'
                    presetColors:
                      - value: blue-dark
                        title: 'Blue Dark'
                        color: '#26224c'
                      - value: blue
                        title: 'Blue'
                        color: '#0114c2'
                      - value: blue-light
                        title: 'Blue Light'
                        color: '#00cffd'
                      - value: purple
                        title: 'Purple'
                        color: '#8a3ffc'
                      - value: purple-dark
                        title: 'Purple Dark'
                        color: '#602cb0'
                      - value: green
                        title: 'Green'
                        color: '#35ba34'
                      - value: green-dark
                        title: 'Green Dark'
                        color: '#1d751d'
                      - value: yellow
                        title: 'Yellow'
                        color: '#f1c21b'
                      - value: yellow-dark
                        title: 'Yellow Dark'
                        color: '#b08c0e'
                      - value: orange
                        title: 'Orange'
                        color: '#ff832b'
                      - value: red
                        title: 'Red'
                        color: '#fa4d56'
                      - value: black
                        title: 'Black'
                        color: '#000000'

            pixelVariant:
              type: string
              defaultValue: 'random'
              scope: nodeAggregate
              ui:
                label: 'Pixel Variant'
                reloadIfChanged: true
                inspector:
                  group: content
                  editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
                  editorOptions:
                    allowEmpty: false
                    values:
                      'random':
                        label: 'Random (default)'
                      '1':
                        label: 'Variant 1'
                      '2':
                        label: 'Variant 2'
                      '3':
                        label: 'Variant 3'

            icon:
              type: string
              scope: nodeAggregate
              ui:
                label: 'Icon'
                reloadIfChanged: true
                inspector:
                  editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
                  editorOptions:
                    placeholder: 'Select an icon'
                    allowEmpty: true
                    values:
                      'arrow-right':
                        label: 'Arrow Right'
                        icon: resource://Neos.Presentation/Assets/Icons/arrow-right.svg
                      'animatedArrow':
                        label: 'Animated Arrow Right'
                        icon: resource://Neos.Presentation/Assets/Icons/arrow-right.svg
                      'animatedArrowLeft':
                        label: 'Animated Arrow Left'
                        icon: resource://Neos.Presentation/Assets/Icons/arrow-right.svg
                      'neosAvatarMonochrome':
                        label: 'Neos Avatar'
                        icon: resource://Neos.Presentation/Assets/Icons/neosAvatarMonochrome.svg
                      'neosLogoMonochrome':
                        label: 'Neos Logo'
                        icon: resource://Neos.Presentation/Assets/Icons/neosLogoMonochrome.svg
                      'briefcase':
                        label: 'Briefcase'
                        icon: resource://Neos.Presentation/Assets/Icons/briefcase.svg
                      'calculator':
