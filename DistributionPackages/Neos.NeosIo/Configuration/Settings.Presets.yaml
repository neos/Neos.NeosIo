Neos:
  Neos:
    nodeTypes:
      presets:
        properties:
          NeosIo:
            text:
              plain:
                type: string
                ui:
                  inlineEditable: true
                  inline:
                    editorOptions:
                      placeholder: '(( text plain ))'
                      autoparagraph: false
                      formatting:
                        removeFormat: true

              block:
                type: string
                ui:
                  inlineEditable: true
                  inline:
                    editorOptions:
                      placeholder: '(( text block ))'
                      autoparagraph: true
                      linking:
                        anchor: true
                        title: true
                        relNofollow: false
                        targetBlank: false
                      formatting:
                        strong: true
                        em: true
                        u: false
                        underline: false
                        strikethrough: false
                        sub: true
                        sup: true
                        del: false
                        p: true
                        h1: false
                        h2: false
                        h3: false
                        h4: false
                        h5: false
                        h6: false
                        pre: false
                        removeFormat: true
                        left: false
                        right: false
                        center: false
                        justify: false
                        table: false
                        ol: false
                        ul: false
                        a: true

              free:
                type: string
                ui:
                  inlineEditable: true
                  inline:
                    editorOptions:
                      placeholder: '(( text ))'
                      autoparagraph: true
                      linking:
                        anchor: true
                        title: true
                        relNofollow: false
                        targetBlank: false
                      formatting:
                        strong: true
                        em: true
                        u: true
                        underline: true
                        strikethrough: true
                        sub: true
                        sup: true
                        del: true
                        p: true
                        h1: true
                        h2: true
                        h3: true
                        h4: true
                        h5: true
                        h6: true
                        pre: true
                        removeFormat: true
                        left: false
                        right: false
                        center: false
                        justify: false
                        table: true
                        ol: true
                        ul: true
                        a: true

            alignment:
              type: string
              ui:
                label: 'Alignment'
                reloadIfChanged: true
                inspector:
                  group: appearance
                  editor: Beromir.ToggleEditor/Editor
                  editorOptions:
                    values:
                      Left:
                        description: Left
                        icon: align-left
                      Center:
                        description: Center
                        icon: align-center
                      Right:
                        description: Right
                        icon: align-right

            color:
              backgroundSolid:
                type: string
                ui:
                  label: 'Background Color'
                  reloadIfChanged: true
                  inspector:
                    group: appearance
                    editor: Beromir.ToggleEditor/Editor
                    editorOptions:
                      layout: color
                      values: &solidColors
                        blue-dark:
                          color: "#26224c"
                          description: "Blue Dark"
                        blue:
                          color: "#0114c2"
                          description: "Blue"
                        blue-light:
                          color: "#00cffd"
                          description: "Blue Light"
                        purple:
                          color: "#8a3ffc"
                          description: "Purple"
                        purple-dark:
                          color: "#602cb0"
                          description: "Purple Dark"
                        green:
                          color: "#35ba34"
                          description: "Green"
                        green-dark:
                          color: "#1d751d"
                          description: "Green Dark"
                        yellow:
                          color: "#f1c21b"
                          description: "Yellow"
                        yellow-dark:
                          color: "#b08c0e"
                          description: "Yellow Dark"
                        orange:
                          color: "#ff832b"
                          description: "Orange"
                        red:
                          color: "#fa4d56"
                          description: "Red"
              backgroundWithGradients:
                type: string
                ui:
                  label: 'Background Color'
                  reloadIfChanged: true
                  inspector:
                    group: appearance
                    editor: Beromir.ToggleEditor/Editor
                    editorOptions:
                      layout: color
                      values:
                        <<: *solidColors
                        blue-dark-to-blue:
                          color:
                            - "#26224c"
                            - "#0114c2"
                          description: "Blue gradient"
                        blue-dark-to-blue-light:
                          color:
                            - "#26224c"
                            - "#00cffd"
                          description: "Dark to light Blue gradient"
                        blue-to-blue-light:
                          color:
                            - "#0114c2"
                            - "#00cffd"
                          description: "Light blue gradient"
                        purple-dark-to-purple:
                          color:
                            - "#602cb0"
                            - "#8a3ffc"
                          description: "Purple gradient"
                        green-dark-to-green:
                          color:
                            - "#1d751d"
                            - "#35ba34"
                          description: "Green gradient"
                        yellow-dark-to-yellow:
                          color:
                            - "#b08c0e"
                            - "#f1c21b"
                          description: "Yellow gradient"
                        red-to-orange:
                          color:
                            - "#fa4d56"
                            - "#ff832b"
                          description: "Orange gradient"
              theme:
                type: string
                ui:
                  label: 'Color'
                  showInCreationDialog: true
                  reloadIfChanged: true
                  inspector:
                    editor: 'Shel.Neos.ColorPicker/ColorPickerEditor'
                    group: appearance
                    editorOptions:
                      mode: 'preset'
                      presetColors:
                        - value: blue-dark
                          title: 'Blue Dark'
                          color: '#26224c'
                        - value: blue
                          title: 'Blue'
                          color: '#0114c2'
                        - value: blue-light
                          title: 'Blue Light'
                          color: '#00cffd'
                        - value: purple
                          title: 'Purple'
                          color: '#8a3ffc'
                        - value: purple-dark
                          title: 'Purple Dark'
                          color: '#602cb0'
                        - value: green
                          title: 'Green'
                          color: '#35ba34'
                        - value: green-dark
                          title: 'Green Dark'
                          color: '#1d751d'
                        - value: yellow
                          title: 'Yellow'
                          color: '#f1c21b'
                        - value: yellow-dark
                          title: 'Yellow Dark'
                          color: '#b08c0e'
                        - value: orange
                          title: 'Orange'
                          color: '#ff832b'
                        - value: red
                          title: 'Red'
                          color: '#fa4d56'
                        - value: black
                          title: 'Black'
                          color: '#000000'
