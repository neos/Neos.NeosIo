'Neos.NeosIo:Mixin.MainNavigationOptions':
  abstract: true
  ui:
    inspector:
      groups:
        navigationOptions:
          label: 'Navigation Options'
          icon: 'sitemap'
  references:
    menuItemsColumn1:
      constraints:
        nodeTypes:
          'Neos.Neos:Document': true
      scope: nodeAggregate
      ui:
        label: 'Menu Items Column 1'
        reloadPageIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: !node.properties.menuLayout'
          editorOptions: &menuItemsColumnOptions
            nodeTypes:
              - 'Neos.Neos:Document'
              - '!Neos.NeosIo:Post'
              - '!Neos.NeosIo.Blog:Document.Tag'
              - '!Neos.MarketPlace:Package'
              - '!Neos.NeosIo.ServiceOfferings:Document.ServiceProvider'
    menuItemsColumn2:
      constraints:
        nodeTypes:
          'Neos.Neos:Document': true
      scope: nodeAggregate
      ui:
        label: 'Menu Items Column 2'
        reloadPageIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: node.properties.menuLayout != "twoColumns"'
          editorOptions: *menuItemsColumnOptions
  properties:
    menuLayout:
      type: string
      scope: nodeAggregate
      ui:
        label: 'Menu Layout'
        help:
          message: 'Defines the column layout of the main navigation. If no layout is selected, the columns will be rendered automatically based on the number of menu items.'
        reloadIfChanged: true
        inspector:
          group: navigationOptions
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            allowEmpty: true
            placeholder: 'Automatic column layout'
            values:
              oneColumn:
                label: '1 Column + Teaser'
              twoColumns:
                label: '2 Columns + Teaser'
    column1Header:
      type: string
      ui:
        label: 'Column 1 Header'
        reloadIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: !node.properties.menuLayout'
    column2Header:
      type: string
      ui:
        label: 'Column 2 Header'
        reloadIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: node.properties.menuLayout != "twoColumns"'
    teaserLink:
      type: string
      scope: nodeAggregate
      ui:
        label: 'Teaser Link'
        reloadIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: !node.properties.menuLayout'
          editor: Neos.Neos/Inspector/Editors/LinkEditor
    teaserText:
      type: string
      ui:
        label: 'Teaser Text'
        reloadIfChanged: true
        inspector:
          hidden: 'ClientEval: !node.properties.menuLayout'
          group: navigationOptions
    teaserImage:
      type: Neos\Media\Domain\Model\ImageInterface
      scope: nodeAggregate
      ui:
        label: 'Teaser Image'
        reloadIfChanged: true
        inspector:
          group: navigationOptions
          hidden: 'ClientEval: !node.properties.menuLayout'
          editor: Neos.Neos/Inspector/Editors/ImageEditor
