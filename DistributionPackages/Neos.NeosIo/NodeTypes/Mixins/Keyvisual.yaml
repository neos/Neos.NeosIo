###########################################
# Mixin which is responsible for all options
# regarding the document keyvisual.
###########################################

'Neos.NeosIo:KeyVisualMixin':
  abstract: true
  childNodes:
    'keyvisual':
      type: 'Neos.Neos:ContentCollection'
      position: 'start'
      label: 'Key visual'
      constraints:
        nodeTypes:
          '*': false
          'Neos.NeosIo:Constraints.KeyVisual': true
  ui:
    inspector:
      groups:
        'keyVisual':
          label: 'Keyvisual'
          position: 10
          collapsed: true
  properties:
    keyVisualVariant:
      type: string
      scope: nodeAggregate
      ui:
        label: 'How to display the key visual contents'
        reloadIfChanged: true
        inspector:
          group: 'keyVisual'
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            allowEmpty: true
            placeholder: 'Large image and text overlay'
            placeholderIcon: 'picture'
            values:
              hidden:
                label: 'Hidden'
                icon: 'eye-slash'
              contentOnly:
                label: 'Content only'
                icon: 'square'
    keyVisualImage:
      type: Neos\Media\Domain\Model\ImageInterface
      scope: nodeAggregate
      ui:
        label: 'Image for the Keyvisual-Section'
        reloadIfChanged: true
        inspector:
          group: 'keyVisual'
          hidden: 'ClientEval: node.properties.keyVisualVariant != ""'
    keyVisualImageSmall:
      type: Neos\Media\Domain\Model\ImageInterface
      scope: nodeAggregate
      ui:
        label: 'Mobile image for the Keyvisual-Section'
        reloadIfChanged: true
        inspector:
          group: 'keyVisual'
          position: 'after keyVisualImage'
          hidden: 'ClientEval: node.properties.keyVisualVariant != ""'
    isKeyVisualContentsInverted:
      scope: nodeAggregate
      type: boolean
      ui:
        label: 'Invert the text-color for the Keyvisual contents'
        reloadIfChanged: true
        inspector:
          group: 'keyVisual'
          hidden: 'ClientEval: node.properties.keyVisualVariant != ""'
