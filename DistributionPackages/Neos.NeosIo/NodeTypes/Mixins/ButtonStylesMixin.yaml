'Neos.NeosIo:Mixin.ButtonStyles':
  abstract: true
  properties:
    alignment:
      type: string
      ui:
        label: 'Button Alignment'
        reloadIfChanged: true
        inspector:
          group: appearance
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            allowEmpty: true
            placeholder: Inline
            values:
              Left:
                label: Left
                icon: align-left
              Center:
                label: Center
                icon: align-center
              Right:
                label: Right
                icon: align-right
    style:
      type: string
      ui:
        label: 'Style of the Button'
        reloadIfChanged: true
        inspector:
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          group: appearance
          editorOptions:
            allowEmpty: true
            placeholder: 'Choose a style'
            values:
              green:
                label: 'Solid green Button'
                icon: resource://Neos.Presentation/Assets/ValueIcons/color-green.svg
              purple:
                label: 'Solid purple Button'
                icon: resource://Neos.Presentation/Assets/ValueIcons/color-purple.svg
              yellow:
                label: 'Solid yellow Button'
                icon: resource://Neos.Presentation/Assets/ValueIcons/color-yellow.svg
              transparent:
                label: 'Transparent with underline'
                icon: resource://Neos.Presentation/Assets/ValueIcons/color-transparent.svg
              link:
                label: 'Link'
                icon: resource://Neos.Presentation/Assets/ValueIcons/color-link.svg
