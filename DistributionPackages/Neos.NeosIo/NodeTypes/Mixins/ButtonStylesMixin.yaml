'Neos.NeosIo:Mixin.ButtonStyles':
  abstract: true
  properties:
    alignment:
      type: string
      ui:
        label: 'Button Alignment'
        reloadIfChanged: true
        inspector:
          group: appearance
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          editorOptions:
            allowEmpty: true
            placeholder: Inline
            values:
              Left:
                label: Left
              Center:
                label: Center
              Right:
                label: Right
    style:
      type: string
      ui:
        label: 'Style of the Button'
        reloadIfChanged: true
        inspector:
          editor: Neos.Neos/Inspector/Editors/SelectBoxEditor
          group: appearance
          editorOptions:
            allowEmpty: true
            placeholder: 'Choose a style'
            values:
              green:
                label: 'Solid green Button'
              purple:
                label: 'Solid purple Button'
              yellow:
                label: 'Solid yellow Button'
              transparent:
                label: 'Transparent with underline'
              link:
                label: 'Link'

