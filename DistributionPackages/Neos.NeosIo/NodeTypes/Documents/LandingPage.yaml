###########################################
# The landing page behaves like the root page
# but is available everywhere
###########################################

'Neos.NeosIo:LandingPage':
  superTypes:
    'Neos.NodeTypes:Page': true
    'Neos.NeosIo:KeyVisualMixin': true
    'Neos.NeosIo:Mixin.HeroStage': true
  ui:
    label: 'Landing page'
    icon: plane
    inspector:
      groups:
        additional:
          label: Additional
          position: 20
  childNodes:
    keyvisual:
      constraints:
        nodeTypes:
          'Neos.NeosIo:Constraints.KeyVisual.LandingPage': true
