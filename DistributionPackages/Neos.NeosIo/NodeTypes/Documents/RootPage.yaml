###########################################
# The root page should ideally only be used
# on 1st level pages.
###########################################

'Neos.NeosIo:RootPage':
  superTypes:
    'Neos.NeosIo:LandingPage': true
    'Neos.Neos:Site': true
    'Neos.NeosIo:Mixin.Disruptor': true
  ui:
    label: 'Root Page'
    icon: home
    inspector:
      groups:
        newsletter:
          label: 'Mailchimp Settings'
          icon: icon-mailchimp
          position: 'after additional'
  constraints:
    nodeTypes:
      'Neos.NodeTypes:Page': true
      'Neos.NeosIo:FooterContainer': true
  properties:
    titlePostfix:
      type: string
      ui:
        label: 'Website Title Postfix'
        inspector:
          group: additional
    imprintLinkNode:
      type: reference
      scope: nodeAggregate
      ui:
        label: 'Imprint Link Page'
        reloadIfChanged: true
        inspector:
          group: additional
          editorOptions:
            nodeTypes:
              - 'Neos.NodeTypes:Page'
              - 'Neos.Neos:Shortcut'
    showSmartAppBanner:
      type: boolean
      scope: nodeAggregate
      ui:
        label: 'Show Smart App Banner'
        inspector:
          group: additional
    iOSAppId:
      type: string
      scope: nodeAggregate
      ui:
        label: 'iOS App Id'
        inspector:
          group: additional
    blogFolder:
      type: reference
      scope: nodeAggregate
      ui:
        label: 'Blog folder'
        inspector:
          group: additional
          editorOptions:
            nodeTypes:
              - Neos.Neos:Document
    nlUser:
      type: string
      scope: nodeAggregate
      ui:
        label: 'User ID'
        inspector:
          group: newsletter
    nlId:
      type: string
      scope: nodeAggregate
      ui:
        label: 'Newsletter ID'
        inspector:
          group: newsletter
  references:
    footerContentContainer:
      constraints:
        maxItems: 1
        nodeTypes:
          '*': false
          'Neos.NeosIo:FooterContainer': true
      ui:
        label: 'Footer content container'
        inspector:
          group: additional
          editorOptions:
            nodeTypes:
              - Neos.NeosIo:FooterContainer
