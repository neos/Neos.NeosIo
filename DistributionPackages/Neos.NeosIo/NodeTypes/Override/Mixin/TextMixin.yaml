'Neos.NodeTypes.BaseMixins:TextMixin':
  properties:
    text:
      ui:
        inline:
          editorOptions:
            formatting:
              left: true
              center: true
              right: true
              justify: true
              sup: true
              sub: true
              styleDefinitions:
                - name: 'Brand color'
                  element: 'span'
                  classes: ['color__neos-brand']
