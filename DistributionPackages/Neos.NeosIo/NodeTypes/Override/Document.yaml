'Neos.Neos:Document':
  constraints:
    nodeTypes:
      'Neos.NeosIo:RootPage': false
      'Neos.NeosIo:FooterContainer': false
  properties:
    neos_fulltext_parts:
      search:
        elasticSearchMapping:
          type: flattened
          enabled: null
    appendSeparatorInMenu:
      type: boolean
      scope: nodeAggregate
      ui:
        reloadIfChanged: true
        label: 'Append separator in menu'
        inspector:
          group: default
