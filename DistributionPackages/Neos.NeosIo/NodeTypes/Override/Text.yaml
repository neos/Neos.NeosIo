'Neos.NodeTypes:Text':
  superTypes:
    'Neos.NeosIo:Constraints.Column': true
    'Neos.NeosIo:Constraints.SemanticSection': true
    'Neos.NeosIo:Constraints.Main': true
  properties:
    text:
      ui:
        inline:
          editorOptions:
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
            formatting:
              h4: true
              h5: true
              styleDefinitions:
                - name: 'Brand color'
                  element: 'span'
                  classes: ['color__neos-brand']
