'Neos.NeosIo:TeamListing':
  superTypes:
    'Neos.Neos:Content': true
    'Neos.NeosIo:Mixin.InternalTitle': true
    'Neos.NeosIo:Constraints.Main': true
    'Neos.NeosIo:Constraints.Stage': true
  ui:
    label: 'Teams & Guilds'
    group: plugins
    icon: group
    inspector:
      groups:
        options:
          label: 'Plugin options'
  properties:
    teamListingFilter:
      type: string
      scope: nodeAggregate
      ui:
        label: 'Type of groups to show'
        reloadIfChanged: true
        inspector:
          group: options
          editor: Content/Inspector/Editors/SelectBoxEditor
          editorOptions:
            placeholder: 'Select one'
            values:
              '':
                label: None
              team:
                label: 'Neos teams'
              guild:
                label: 'Neos guilds'
              council:
                label: 'Neos Council'
              cic:
                label: 'Neos foundation members'
              cicDirectors:
                label: 'Neos foundation directors'
    teamName:
      type: string
      ui:
        label: 'Exact group name to display'
        reloadIfChanged: true
        inspector:
          group: options
