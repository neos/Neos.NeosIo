###########################################
# A image based teaser which is best used in
# grid elements to promote sub-pages or case studies.
###########################################

'Neos.NeosIo:ImageTeaser':
  superTypes:
    'Neos.Neos:Content': true
    'Neos.NeosIo:Mixin.Teaser': true
    'Neos.NodeTypes:ImageMixin': true
    'Neos.NodeTypes:LinkMixin': true
  ui:
    label: 'Teaser with image'
    icon: th-large
    group: special
  properties:
    title:
      type: string
      ui:
        label: 'Title'
        showInCreationDialog: true
        inlineEditable: true
        inspector:
          group: false
        inline:
          editorOptions:
            placeholder: 'Enter title here'
    subTitle:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Enter subtitle here'
    text:
      type: string
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Enter text here'
    link:
      ui:
        label: 'Teaser Link'
        inspector:
          group: content
    openInNewTab:
      ui:
        inspector:
          group: content
