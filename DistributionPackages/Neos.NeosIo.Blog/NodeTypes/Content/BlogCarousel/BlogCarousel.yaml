'Neos.NeosIo:Content.BlogCarousel':
  superTypes:
    'Neos.Neos:Content': true
    'Neos.NeosIo:Constraints.Main': true
  ui:
    label: 'Blog Carousel'
    icon: newspaper
    group: plugins
  references:
    filterTags:
      ui:
        label: 'Filter by Tag(s)'
        reloadPageIfChanged: true
        inspector:
          group: content
          editorOptions:
            nodeTypes:
              - 'Neos.NeosIo.Blog:Document.Tag'
  properties:
    title:
      type: string
      ui:
        label: 'Title'
        inlineEditable: true
        inline:
          editorOptions:
            placeholder: 'Enter title here'
    maxItems:
      type: integer
      defaultValue: 10
      ui:
        label: 'Maximum number of items'
        reloadPageIfChanged: true
        inspector:
          group: content
          editor: Neos.Neos/Inspector/Editors/RangeEditor
          editorOptions:
            min: 1
            max: 20
            step: 1
    autoplay:
      type: boolean
      defaultValue: false
      ui:
        label: 'Autoplay'
        reloadPageIfChanged: true
        inspector:
          group: content
